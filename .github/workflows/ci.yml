name: CI

# Runs svelte-check, vitest, and a full build on every push and PR.
# Matrix covers both the site root and the editor sub-app because the two
# have independent dependency trees and should both stay green.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  site:
    name: site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test
      # Build last so any regression caught by check/test fails fast.
      # Cloudflare adapter build is environment-sensitive; keep it in CI
      # so a broken worker build blocks merges.
      - run: npm run build

  editor:
    name: editor
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: editor/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build
