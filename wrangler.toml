name = "site"
compatibility_date = "2025-11-17"
compatibility_flags = [
	"nodejs_compat",
]
main = "./.cloudflare/worker.js"

[site]
bucket = "./.cloudflare/public"

[build]
command = "npm run build"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1